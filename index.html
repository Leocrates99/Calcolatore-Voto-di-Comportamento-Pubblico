<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calcolatore Voto di Comportamento</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700;8..60,800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1a2744;
      --navy-light: #243352;
      --gold: #c9a84c;
      --gold-light: #e8d48b;
      --cream: #faf8f2;
      --sage: #6b8f71;
      --sage-light: #e8f0e9;
      --coral: #c45c4a;
      --coral-light: #fce8e5;
      --slate-warm: #64748b;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); }
    h1, h2, h3, .font-serif { font-family: 'Source Serif 4', serif; }
    .slider-thumb::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
      background: var(--navy); cursor: pointer; border: 2.5px solid white;
      box-shadow: 0 2px 6px rgba(26,39,68,0.3);
    }
    .slider-thumb::-moz-range-thumb {
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--navy); cursor: pointer; border: 2.5px solid white;
      box-shadow: 0 2px 6px rgba(26,39,68,0.3);
    }
    .component-card { transition: all 0.2s ease; }
    .component-card:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,39,68,0.08); }
    @media print { .no-print { display: none !important; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes pulse-gold { 0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.3); } 50% { box-shadow: 0 0 0 8px rgba(201,168,76,0); } }
    .pulse-gold { animation: pulse-gold 2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React;

    const CalcolatoreComportamento = () => {
      // Componenti della valutazione del comportamento
      const componentiDefault = [
        {
          id: 'partecipazione',
          nome: 'Partecipazione',
          descrizione: 'Grado di coinvolgimento alle lezioni, alle iniziative curricolari ed extracurricolari proposte dalla scuola.',
          min: 1, max: 6, valore: 1,
          icona: '🎯',
          colore: '#4f46e5'
        },
        {
          id: 'impegno',
          nome: 'Impegno',
          descrizione: 'Livello di autonomia, puntualità, precisione e regolarità nello svolgimento dei compiti assegnati.',
          min: 1, max: 6, valore: 1,
          icona: '📚',
          colore: '#7c3aed'
        },
        {
          id: 'collaborazione',
          nome: 'Collaborazione',
          descrizione: 'Qualità del contributo di disponibilità alle iniziative del gruppo classe.',
          min: 1, max: 6, valore: 1,
          icona: '🤝',
          colore: '#2563eb'
        },
        {
          id: 'dialogo',
          nome: 'Dialogo Educativo',
          descrizione: 'Livello di interesse e grado di coinvolgimento nel dialogo educativo, in considerazione delle proprie attitudini.',
          min: 1, max: 12, valore: 1,
          icona: '💬',
          colore: '#0891b2'
        },
        {
          id: 'frequenza',
          nome: 'Frequenza',
          descrizione: 'Regolarità della frequenza scolastica, riferita alle assenze, ai ritardi e alle uscite anticipate.',
          min: 1, max: 12, valore: 1,
          icona: '📅',
          colore: '#059669'
        },
        {
          id: 'relazioni',
          nome: 'Relazioni',
          descrizione: 'Grado di correttezza nel dialogo con i compagni, i docenti e il personale dell\'Istituto e di rispetto verso ambienti, strutture e materiali.',
          min: 1, max: 12, valore: 1,
          icona: '👥',
          colore: '#d97706'
        },
        {
          id: 'regole',
          nome: 'Regole',
          descrizione: 'Qualità della osservanza delle regole generali e del Regolamento di Istituto.',
          min: 1, max: 6, valore: 1,
          icona: '📋',
          colore: '#dc2626'
        }
      ];

      // Tabella conversione punteggio → voto
      const tabellaConversione = [
        { min: 55, max: 60, voto: 10, giudizio: 'Esemplare',   colore: '#059669', bg: '#ecfdf5', border: '#6ee7b7' },
        { min: 48, max: 54, voto: 9,  giudizio: 'Ottimo',      colore: '#0d9488', bg: '#f0fdfa', border: '#5eead4' },
        { min: 41, max: 47, voto: 8,  giudizio: 'Buono',       colore: '#2563eb', bg: '#eff6ff', border: '#93c5fd' },
        { min: 34, max: 40, voto: 7,  giudizio: 'Discreto',    colore: '#7c3aed', bg: '#f5f3ff', border: '#c4b5fd' },
        { min: 25, max: 33, voto: 6,  giudizio: 'Sufficiente', colore: '#d97706', bg: '#fffbeb', border: '#fcd34d' },
        { min: 7,  max: 24, voto: 5,  giudizio: 'Non sufficiente', colore: '#dc2626', bg: '#fef2f2', border: '#fca5a5' }
      ];

      const [componenti, setComponenti] = useState(componentiDefault);
      const [studenteNome, setStudenteNome] = useState('');
      const [classe, setClasse] = useState('');
      const [periodo, setPeriodo] = useState('I Quadrimestre');
      const [annoScolastico, setAnnoScolastico] = useState('2025/2026');
      const [showPrintPreview, setShowPrintPreview] = useState(false);
      const [showTabella, setShowTabella] = useState(false);
      const [notification, setNotification] = useState(null);
      const [note, setNote] = useState('');
      const printRef = useRef();

      // Carica dati salvati
      useEffect(() => {
        try {
          const saved = localStorage.getItem('calcolatoreComportamento_state');
          if (saved) {
            const parsed = JSON.parse(saved);
            if (parsed.componenti) setComponenti(prev => prev.map((c, i) => ({...c, valore: parsed.componenti[i]?.valore || c.min})));
            if (parsed.studenteNome) setStudenteNome(parsed.studenteNome);
            if (parsed.classe) setClasse(parsed.classe);
            if (parsed.periodo) setPeriodo(parsed.periodo);
            if (parsed.annoScolastico) setAnnoScolastico(parsed.annoScolastico);
            if (parsed.note) setNote(parsed.note);
          }
        } catch(e) { console.log('Errore caricamento:', e); }
      }, []);

      // Salva stato
      useEffect(() => {
        const state = { componenti: componenti.map(c => ({id: c.id, valore: c.valore})), studenteNome, classe, periodo, annoScolastico, note };
        localStorage.setItem('calcolatoreComportamento_state', JSON.stringify(state));
      }, [componenti, studenteNome, classe, periodo, annoScolastico, note]);

      const showNotification = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 3000);
      };

      const calcoli = useMemo(() => {
        const totale60 = componenti.reduce((sum, c) => sum + c.valore, 0);
        const totaleMax = componenti.reduce((sum, c) => sum + c.max, 0); // 60
        const percentuale = (totale60 / totaleMax) * 100;
        const su10 = (totale60 / totaleMax) * 10;

        // Trova fascia nella tabella conversione
        const fascia = tabellaConversione.find(f => totale60 >= f.min && totale60 <= f.max) 
          || tabellaConversione[tabellaConversione.length - 1];

        // Analisi per componente
        const analisi = componenti.map(c => {
          const perc = ((c.valore - c.min) / (c.max - c.min)) * 100;
          const incidenza = (c.max / totaleMax) * 100;
          return { ...c, percentuale: perc, incidenza };
        });

        const percentuali = analisi.map(a => a.percentuale);
        const media = percentuali.reduce((a, b) => a + b, 0) / percentuali.length;
        const puntoForte = analisi.reduce((max, a) => a.percentuale > max.percentuale ? a : max, analisi[0]);
        const puntoDebole = analisi.reduce((min, a) => a.percentuale < min.percentuale ? a : min, analisi[0]);

        return {
          totale60, totaleMax, percentuale, su10,
          fascia, analisi, media,
          puntoForte, puntoDebole,
          isSufficiente: fascia.voto >= 6
        };
      }, [componenti]);

      const aggiornaValore = (id, valore) => {
        setComponenti(componenti.map(c => {
          if (c.id !== id) return c;
          return { ...c, valore: Math.min(c.max, Math.max(c.min, parseInt(valore) || c.min)) };
        }));
      };

      const resetTutto = () => {
        setComponenti(componentiDefault);
        setStudenteNome('');
        setClasse('');
        setNote('');
        showNotification('Valutazione resettata');
      };

      const handlePrint = () => {
        const printContent = printRef.current;
        const printWindow = window.open('', '', 'width=800,height=600');
        printWindow.document.write(`
          <html>
            <head>
              <title>Scheda Comportamento - ${studenteNome || 'Studente'}</title>
              <style>
                @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700;8..60,800&family=DM+Sans:wght@400;500;600;700&display=swap');
                * { margin: 0; padding: 0; box-sizing: border-box; }
                body { font-family: 'DM Sans', sans-serif; padding: 25px; color: #1a2744; font-size: 12px; }
                h1, h2, h3 { font-family: 'Source Serif 4', serif; }
                .header { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2.5px solid #1a2744; }
                .header h1 { font-size: 20px; color: #1a2744; letter-spacing: 0.5px; }
                .header p { font-size: 11px; color: #64748b; margin-top: 4px; }
                .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
                .info-item { padding: 8px 12px; background: #f8fafc; border-radius: 6px; border: 1px solid #e2e8f0; }
                .info-item label { font-size: 9px; color: #64748b; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
                .info-item span { font-size: 12px; font-weight: 600; }
                .voto-box { text-align: center; padding: 18px; border-radius: 12px; margin-bottom: 20px; }
                .voto-box .voto { font-family: 'Source Serif 4', serif; font-size: 52px; font-weight: 800; }
                .voto-box .giudizio { display: inline-block; padding: 4px 16px; color: white; border-radius: 20px; font-size: 11px; font-weight: 600; margin-top: 4px; letter-spacing: 0.3px; }
                .voto-box .punteggio { font-size: 13px; color: #64748b; margin-top: 8px; }
                table { width: 100%; border-collapse: collapse; margin-bottom: 18px; font-size: 11px; }
                th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #e2e8f0; }
                th { background: #1a2744; color: white; font-weight: 600; font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; }
                th:first-child { border-radius: 6px 0 0 0; }
                th:last-child { border-radius: 0 6px 0 0; }
                .text-center { text-align: center; }
                .font-bold { font-weight: 700; }
                .totale-row { background: #f1f5f9; font-weight: 700; }
                .totale-row td { border-top: 2px solid #1a2744; }
                .bar-container { width: 80px; height: 6px; background: #e2e8f0; border-radius: 3px; display: inline-block; vertical-align: middle; margin-right: 6px; }
                .bar-fill { height: 100%; border-radius: 3px; }
                .note-section { margin-top: 20px; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; }
                .note-section h3 { font-size: 11px; color: #475569; margin-bottom: 8px; }
                .note-text { min-height: 50px; font-size: 11px; color: #334155; white-space: pre-wrap; }
                .signature { margin-top: 35px; display: flex; justify-content: space-between; }
                .signature-line { width: 180px; border-top: 1px solid #1a2744; padding-top: 5px; font-size: 9px; color: #64748b; text-align: center; }
                .footer { margin-top: 25px; padding-top: 12px; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-between; font-size: 9px; color: #94a3b8; }
                .conv-table { width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 15px; }
                .conv-table th { background: #f1f5f9; color: #475569; padding: 5px 8px; }
                .conv-table td { padding: 5px 8px; text-align: center; border-bottom: 1px solid #e2e8f0; }
                .conv-highlight { background: #fffbeb; font-weight: 700; }
                @media print { body { padding: 15px; } }
              </style>
            </head>
            <body>${printContent.innerHTML}</body>
          </html>
        `);
        printWindow.document.close();
        printWindow.focus();
        setTimeout(() => { printWindow.print(); printWindow.close(); }, 250);
      };

      // Slider per i punteggi
      const PunteggiSlider = ({ comp }) => {
        const perc = ((comp.valore - comp.min) / (comp.max - comp.min)) * 100;
        const isHigh = perc >= 70;
        const isMid = perc >= 40 && perc < 70;
        const barColor = isHigh ? '#059669' : isMid ? '#d97706' : '#dc2626';

        return (
          <div className="component-card bg-white rounded-xl border border-slate-200 p-4 fade-in" style={{borderLeftWidth: '4px', borderLeftColor: comp.colore}}>
            <div className="flex items-start justify-between mb-2">
              <div className="flex items-center gap-2">
                <span className="text-lg">{comp.icona}</span>
                <div>
                  <h3 className="font-semibold text-sm" style={{color: 'var(--navy)'}}>{comp.nome}</h3>
                  <p className="text-xs text-slate-500 mt-0.5 leading-relaxed max-w-md">{comp.descrizione}</p>
                </div>
              </div>
              <div className="text-right flex-shrink-0 ml-3">
                <div className="text-2xl font-bold font-serif" style={{color: comp.colore}}>{comp.valore}</div>
                <div className="text-xs text-slate-400">/ {comp.max}</div>
              </div>
            </div>

            <div className="flex items-center gap-3 mt-3">
              <span className="text-xs text-slate-400 w-3">{comp.min}</span>
              <div className="flex-1 relative">
                <input
                  type="range"
                  min={comp.min}
                  max={comp.max}
                  step={1}
                  value={comp.valore}
                  onChange={(e) => aggiornaValore(comp.id, e.target.value)}
                  className="w-full h-2 rounded-lg appearance-none cursor-pointer slider-thumb"
                  style={{
                    background: `linear-gradient(to right, ${comp.colore} 0%, ${comp.colore} ${perc}%, #e2e8f0 ${perc}%, #e2e8f0 100%)`
                  }}
                />
                {/* Tacche */}
                <div className="flex justify-between px-0.5 mt-1">
                  {Array.from({length: comp.max - comp.min + 1}, (_, i) => (
                    <button
                      key={i}
                      onClick={() => aggiornaValore(comp.id, comp.min + i)}
                      className={`w-5 h-5 rounded-full text-xs flex items-center justify-center transition-all cursor-pointer ${
                        comp.min + i === comp.valore 
                          ? 'text-white font-bold shadow-sm' 
                          : comp.min + i <= comp.valore 
                            ? 'bg-slate-100 text-slate-500 hover:bg-slate-200' 
                            : 'text-slate-300 hover:text-slate-400'
                      }`}
                      style={comp.min + i === comp.valore ? {background: comp.colore} : {}}
                    >
                      {comp.min + i}
                    </button>
                  ))}
                </div>
              </div>
              <span className="text-xs text-slate-400 w-3">{comp.max}</span>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen p-3 md:p-4" style={{background: 'var(--cream)'}}>
          {/* Notification */}
          {notification && (
            <div className={`fixed top-4 right-4 z-50 px-4 py-2 rounded-lg shadow-lg text-white text-sm font-medium ${
              notification.type === 'warning' ? 'bg-orange-500' : 'bg-emerald-600'
            }`} style={{animation: 'fadeIn 0.3s ease'}}>
              {notification.message}
            </div>
          )}
          
          <div className="max-w-6xl mx-auto space-y-3">
            
            {/* Header */}
            <div className="rounded-xl shadow-sm border p-4 no-print" style={{background: 'var(--navy)', borderColor: 'var(--navy)'}}>
              <div className="flex flex-wrap justify-between items-center gap-3">
                <div>
                  <h1 className="text-xl font-bold text-white font-serif tracking-wide">Valutazione del Comportamento</h1>
                  <p className="text-xs mt-1" style={{color: 'var(--gold-light)'}}>
                    7 componenti · Punteggio su 60 · Conversione in decimi
                  </p>
                </div>
                <div className="flex flex-wrap gap-2">
                  <button onClick={() => setShowTabella(!showTabella)} 
                    className="px-3 py-1.5 text-xs rounded-md transition-all hover:opacity-90 font-medium"
                    style={{background: 'rgba(201,168,76,0.15)', color: 'var(--gold-light)', border: '1px solid rgba(201,168,76,0.3)'}}>
                    📊 Tabella conversione
                  </button>
                  <button onClick={resetTutto} 
                    className="px-3 py-1.5 text-xs rounded-md transition-all hover:opacity-90 font-medium"
                    style={{background: 'rgba(255,255,255,0.1)', color: 'rgba(255,255,255,0.8)', border: '1px solid rgba(255,255,255,0.15)'}}>
                    ↺ Reset
                  </button>
                  <button onClick={() => setShowPrintPreview(true)} 
                    className="px-3 py-1.5 text-xs rounded-md transition-all hover:opacity-90 font-medium"
                    style={{background: 'var(--gold)', color: 'var(--navy)'}}>
                    🖨 Scheda valutazione
                  </button>
                </div>
              </div>
            </div>

            {/* Tabella conversione */}
            {showTabella && (
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 no-print fade-in">
                <h3 className="font-serif font-semibold text-sm mb-3" style={{color: 'var(--navy)'}}>📊 Tabella di Conversione Punteggio → Voto</h3>
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead>
                      <tr>
                        <th className="text-left p-2 text-xs font-semibold text-slate-500 uppercase tracking-wide border-b-2" style={{borderColor: 'var(--navy)'}}>Punteggio /60</th>
                        <th className="text-center p-2 text-xs font-semibold text-slate-500 uppercase tracking-wide border-b-2" style={{borderColor: 'var(--navy)'}}>su 10</th>
                        <th className="text-center p-2 text-xs font-semibold text-slate-500 uppercase tracking-wide border-b-2" style={{borderColor: 'var(--navy)'}}>Voto</th>
                        <th className="text-center p-2 text-xs font-semibold text-slate-500 uppercase tracking-wide border-b-2" style={{borderColor: 'var(--navy)'}}>Giudizio</th>
                      </tr>
                    </thead>
                    <tbody>
                      {tabellaConversione.map(f => {
                        const isActive = calcoli.fascia.voto === f.voto;
                        return (
                          <tr key={f.voto} className={`transition-colors ${isActive ? 'font-bold' : ''}`}
                            style={isActive ? {background: f.bg} : {}}>
                            <td className="p-2 border-b border-slate-100">{f.min} – {f.max}</td>
                            <td className="p-2 border-b border-slate-100 text-center">{(f.min/6).toFixed(1)} – {(f.max/6).toFixed(1)}</td>
                            <td className="p-2 border-b border-slate-100 text-center">
                              <span className="inline-block w-8 h-8 rounded-full text-white font-bold text-sm leading-8"
                                style={{background: f.colore}}>{f.voto}</span>
                            </td>
                            <td className="p-2 border-b border-slate-100 text-center">
                              <span className="px-3 py-1 rounded-full text-xs font-semibold" 
                                style={{background: f.bg, color: f.colore, border: `1px solid ${f.border}`}}>
                                {f.giudizio} {isActive ? '◄' : ''}
                              </span>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* Info studente */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-3 no-print">
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div>
                  <label className="block text-xs text-slate-500 mb-1 font-medium">Studente</label>
                  <input type="text" value={studenteNome} onChange={(e) => setStudenteNome(e.target.value)}
                    placeholder="Cognome Nome" className="w-full px-3 py-1.5 text-sm border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400 outline-none transition-all" />
                </div>
                <div>
                  <label className="block text-xs text-slate-500 mb-1 font-medium">Classe</label>
                  <input type="text" value={classe} onChange={(e) => setClasse(e.target.value)}
                    placeholder="Es: 3B" className="w-full px-3 py-1.5 text-sm border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400 outline-none transition-all" />
                </div>
                <div>
                  <label className="block text-xs text-slate-500 mb-1 font-medium">Periodo</label>
                  <select value={periodo} onChange={(e) => setPeriodo(e.target.value)}
                    className="w-full px-3 py-1.5 text-sm border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400 outline-none transition-all">
                    <option>I Quadrimestre</option>
                    <option>II Quadrimestre</option>
                    <option>I Trimestre</option>
                    <option>II Trimestre</option>
                    <option>III Trimestre</option>
                    <option>Scrutinio finale</option>
                  </select>
                </div>
                <div>
                  <label className="block text-xs text-slate-500 mb-1 font-medium">Anno scolastico</label>
                  <input type="text" value={annoScolastico} onChange={(e) => setAnnoScolastico(e.target.value)}
                    placeholder="2025/2026" className="w-full px-3 py-1.5 text-sm border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400 outline-none transition-all" />
                </div>
              </div>
            </div>

            {/* Main Grid: Componenti + Risultato */}
            <div className="grid grid-cols-12 gap-3">
              
              {/* Componenti */}
              <div className="col-span-12 lg:col-span-7 space-y-2">
                {componenti.map(comp => (
                  <PunteggiSlider key={comp.id} comp={comp} />
                ))}
              </div>

              {/* Risultato */}
              <div className="col-span-12 lg:col-span-5 space-y-3">
                
                {/* Voto Finale */}
                <div className="rounded-xl shadow-sm border p-5 text-center transition-all"
                  style={{background: calcoli.fascia.bg, borderColor: calcoli.fascia.border, borderWidth: '2px'}}>
                  <div className="text-xs font-semibold uppercase tracking-widest mb-2" style={{color: calcoli.fascia.colore}}>
                    Voto proposto al Consiglio di Classe
                  </div>
                  <div className="flex items-center justify-center gap-5">
                    <div>
                      <div className="text-6xl font-black font-serif" style={{color: calcoli.fascia.colore}}>
                        {calcoli.fascia.voto}
                      </div>
                    </div>
                    <div className="text-left">
                      <div className="inline-block px-3 py-1.5 rounded-full text-xs font-bold text-white tracking-wide"
                        style={{background: calcoli.fascia.colore}}>
                        {calcoli.fascia.giudizio}
                      </div>
                      <div className="text-xs mt-2 font-medium" style={{color: 'var(--slate-warm)'}}>
                        {calcoli.totale60} / {calcoli.totaleMax} punti
                      </div>
                      <div className="text-xs" style={{color: 'var(--slate-warm)'}}>
                        ({calcoli.su10.toFixed(2)} su 10)
                      </div>
                    </div>
                  </div>

                  {/* Barra progressiva */}
                  <div className="mt-4 relative">
                    <div className="h-3 rounded-full overflow-hidden" style={{background: '#e2e8f0'}}>
                      <div className="h-full rounded-full transition-all duration-500"
                        style={{width: `${calcoli.percentuale}%`, background: calcoli.fascia.colore}} />
                    </div>
                    {/* Marcatori soglie */}
                    <div className="relative h-4 mt-1">
                      {tabellaConversione.map(f => {
                        const pos = (f.min / 60) * 100;
                        return (
                          <div key={f.voto} className="absolute text-xs" style={{left: `${pos}%`, transform: 'translateX(-50%)', color: '#94a3b8', fontSize: '9px'}}>
                            {f.voto}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>

                {/* Riepilogo componenti */}
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
                  <h3 className="text-xs font-semibold uppercase tracking-wide mb-3" style={{color: 'var(--navy)'}}>
                    Riepilogo Punteggi
                  </h3>
                  <div className="space-y-2">
                    {calcoli.analisi.map(a => (
                      <div key={a.id} className="flex items-center gap-2 text-xs">
                        <span className="w-4 text-center">{a.icona}</span>
                        <span className="w-28 truncate text-slate-600 font-medium">{a.nome}</span>
                        <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                          <div className="h-full rounded-full transition-all duration-300" 
                            style={{width: `${a.percentuale}%`, background: a.colore}} />
                        </div>
                        <span className="w-12 text-right font-bold" style={{color: a.colore}}>
                          {a.valore}/{a.max}
                        </span>
                      </div>
                    ))}
                    <div className="flex items-center gap-2 text-xs pt-2 border-t border-slate-200 font-bold">
                      <span className="w-4"></span>
                      <span className="w-28 font-serif" style={{color: 'var(--navy)'}}>TOTALE</span>
                      <div className="flex-1"></div>
                      <span className="w-12 text-right font-serif text-base" style={{color: 'var(--navy)'}}>
                        {calcoli.totale60}/{calcoli.totaleMax}
                      </span>
                    </div>
                  </div>
                </div>

                {/* Analisi */}
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
                  <h3 className="text-xs font-semibold uppercase tracking-wide mb-3" style={{color: 'var(--navy)'}}>
                    Analisi
                  </h3>
                  <div className="grid grid-cols-2 gap-2 text-xs">
                    <div className="p-2.5 rounded-lg" style={{background: '#ecfdf5', border: '1px solid #a7f3d0'}}>
                      <div className="text-emerald-700 font-medium">📈 Punto di forza</div>
                      <div className="font-bold text-emerald-800 mt-0.5 truncate">{calcoli.puntoForte.nome}</div>
                      <div className="text-emerald-600">{calcoli.puntoForte.valore}/{calcoli.puntoForte.max} ({calcoli.puntoForte.percentuale.toFixed(0)}%)</div>
                    </div>
                    <div className="p-2.5 rounded-lg" style={{background: '#fef2f2', border: '1px solid #fecaca'}}>
                      <div className="text-red-700 font-medium">📉 Da migliorare</div>
                      <div className="font-bold text-red-800 mt-0.5 truncate">{calcoli.puntoDebole.nome}</div>
                      <div className="text-red-600">{calcoli.puntoDebole.valore}/{calcoli.puntoDebole.max} ({calcoli.puntoDebole.percentuale.toFixed(0)}%)</div>
                    </div>
                  </div>

                  {/* Distribuzione pesi */}
                  <div className="mt-3 pt-3 border-t border-slate-100">
                    <div className="text-xs text-slate-500 mb-2 font-medium">Incidenza componenti sul totale</div>
                    <div className="flex gap-1 h-5 rounded-full overflow-hidden">
                      {calcoli.analisi.map(a => (
                        <div key={a.id} className="relative group transition-all hover:opacity-80 cursor-pointer"
                          style={{width: `${a.incidenza}%`, background: a.colore, minWidth: '2px'}}
                          title={`${a.nome}: ${a.incidenza.toFixed(0)}% del totale`}>
                        </div>
                      ))}
                    </div>
                    <div className="flex flex-wrap gap-x-3 gap-y-0.5 mt-1.5">
                      {calcoli.analisi.map(a => (
                        <div key={a.id} className="flex items-center gap-1 text-xs text-slate-500">
                          <div className="w-2 h-2 rounded-full" style={{background: a.colore}}></div>
                          <span>{a.nome.split(' ')[0]} {a.incidenza.toFixed(0)}%</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* Note */}
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 no-print">
                  <h3 className="text-xs font-semibold uppercase tracking-wide mb-2" style={{color: 'var(--navy)'}}>
                    Note del docente
                  </h3>
                  <textarea
                    value={note}
                    onChange={(e) => setNote(e.target.value)}
                    placeholder="Eventuali annotazioni sul comportamento dello studente..."
                    className="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400 outline-none transition-all resize-none"
                    rows={3}
                  />
                </div>
              </div>
            </div>

            {/* Footer */}
            <div className="text-center text-xs no-print" style={{color: '#94a3b8'}}>
              Calcolatore Comportamento v1.0 · I dati vengono salvati nel browser
            </div>
          </div>

          {/* Modal Anteprima Stampa */}
          {showPrintPreview && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" style={{backdropFilter: 'blur(4px)'}}>
              <div className="bg-white rounded-xl shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-auto">
                <div className="sticky top-0 bg-white border-b p-4 flex justify-between items-center z-10">
                  <h2 className="font-bold text-lg font-serif" style={{color: 'var(--navy)'}}>Anteprima Scheda Valutazione</h2>
                  <div className="flex gap-2">
                    <button onClick={handlePrint} className="px-4 py-2 text-white rounded-lg text-sm font-medium transition-colors hover:opacity-90"
                      style={{background: 'var(--navy)'}}>
                      🖨 Stampa
                    </button>
                    <button onClick={() => setShowPrintPreview(false)} className="px-4 py-2 bg-slate-200 hover:bg-slate-300 rounded-lg text-sm transition-colors">
                      Chiudi
                    </button>
                  </div>
                </div>
                
                <div ref={printRef} className="p-6">
                  <div className="header">
                    <h1>SCHEDA DI VALUTAZIONE DEL COMPORTAMENTO</h1>
                    <p>{periodo} — Anno Scolastico {annoScolastico}</p>
                  </div>
                  
                  <div className="info-grid">
                    <div className="info-item">
                      <label>Studente</label>
                      <span>{studenteNome || '___________________________'}</span>
                    </div>
                    <div className="info-item">
                      <label>Classe</label>
                      <span>{classe || '___________'}</span>
                    </div>
                    <div className="info-item">
                      <label>Periodo</label>
                      <span>{periodo}</span>
                    </div>
                    <div className="info-item">
                      <label>Data</label>
                      <span>{new Date().toLocaleDateString('it-IT', { day: '2-digit', month: 'long', year: 'numeric' })}</span>
                    </div>
                  </div>
                  
                  <div className="voto-box" style={{background: calcoli.fascia.bg, border: `2px solid ${calcoli.fascia.border}`, borderRadius: '12px'}}>
                    <div className="voto" style={{color: calcoli.fascia.colore}}>{calcoli.fascia.voto}</div>
                    <div className="giudizio" style={{background: calcoli.fascia.colore}}>{calcoli.fascia.giudizio}</div>
                    <div className="punteggio">
                      {calcoli.totale60} / {calcoli.totaleMax} punti — {calcoli.su10.toFixed(2)} su 10
                    </div>
                  </div>
                  
                  <table>
                    <thead>
                      <tr>
                        <th>Componente</th>
                        <th className="text-center">Punteggio</th>
                        <th className="text-center">Max</th>
                        <th className="text-center">%</th>
                        <th style={{width: '100px'}}>Livello</th>
                      </tr>
                    </thead>
                    <tbody>
                      {calcoli.analisi.map(a => (
                        <tr key={a.id}>
                          <td style={{fontWeight: 500}}>{a.nome}</td>
                          <td className="text-center font-bold">{a.valore}</td>
                          <td className="text-center" style={{color: '#64748b'}}>{a.max}</td>
                          <td className="text-center font-bold">{a.percentuale.toFixed(0)}%</td>
                          <td>
                            <span className="bar-container">
                              <span className="bar-fill" style={{width: `${a.percentuale}%`, background: a.colore}}></span>
                            </span>
                          </td>
                        </tr>
                      ))}
                      <tr className="totale-row">
                        <td>TOTALE</td>
                        <td className="text-center font-bold" style={{fontSize: '14px'}}>{calcoli.totale60}</td>
                        <td className="text-center">{calcoli.totaleMax}</td>
                        <td className="text-center font-bold">{calcoli.percentuale.toFixed(1)}%</td>
                        <td></td>
                      </tr>
                    </tbody>
                  </table>

                  {/* Tabella conversione nella stampa */}
                  <div style={{marginTop: '15px'}}>
                    <h3 style={{fontSize: '11px', color: '#475569', marginBottom: '6px', fontFamily: 'Source Serif 4, serif'}}>Tabella di conversione</h3>
                    <table className="conv-table">
                      <thead>
                        <tr>
                          <th>Punteggio</th>
                          <th>su 10</th>
                          <th>Voto</th>
                          <th>Giudizio</th>
                        </tr>
                      </thead>
                      <tbody>
                        {tabellaConversione.map(f => (
                          <tr key={f.voto} className={calcoli.fascia.voto === f.voto ? 'conv-highlight' : ''}>
                            <td>{f.min}–{f.max}</td>
                            <td>{(f.min/6).toFixed(1)}–{(f.max/6).toFixed(1)}</td>
                            <td style={{fontWeight: 700, color: f.colore}}>{f.voto}</td>
                            <td>{f.giudizio}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>

                  {/* Note */}
                  <div className="note-section" style={{marginTop: '18px'}}>
                    <h3 style={{fontFamily: 'Source Serif 4, serif'}}>Note del docente</h3>
                    <div className="note-text">{note || '\n\n'}</div>
                  </div>
                  
                  <div className="signature">
                    <div className="signature-line">Il Coordinatore</div>
                    <div className="signature-line">Il Dirigente Scolastico</div>
                  </div>
                  
                  <div className="footer">
                    <span>Generato il {new Date().toLocaleDateString('it-IT')}</span>
                    <span>Calcolatore Comportamento v1.0</span>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CalcolatoreComportamento />);
  </script>
</body>
</html>
